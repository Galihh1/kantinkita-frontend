<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="KantinKita - Platform Kantin Digital untuk Kampus & Sekolah" />
    <meta name="theme-color" content="#2D6A4F" />
    <meta http-equiv="Content-Security-Policy" content="default-src * 'self' 'unsafe-inline' 'unsafe-eval' data: gap: content: blob:; script-src * 'self' 'unsafe-inline' 'unsafe-eval'; style-src * 'self' 'unsafe-inline'; connect-src * 'self' 'unsafe-inline'; img-src * 'self' data: blob:; frame-src * 'self';">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>KantinKita</title>
  </head>
  <body>
    <div id="root">
      <style>
        .initial-loader {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background-color: #ffffff;
          z-index: 9999;
          font-family: sans-serif;
        }
        .spinner {
          width: 48px;
          height: 48px;
          border: 4px solid #f3f3f3;
          border-top: 4px solid #2D6A4F;
          border-radius: 50%;
          animation: spin 1s linear infinite;
          margin-bottom: 16px;
        }
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
        .loading-text {
          color: #666;
          font-size: 14px;
        }
      </style>
      <div class="initial-loader">
        <div class="spinner"></div>
        <div class="loading-text">Menyiapkan KantinKita...</div>
      </div>
    </div>
    <!-- Midtrans Snap -->
    <script 
      type="text/javascript"
      src="%VITE_MIDTRANS_SNAP_URL%"
      data-client-key="%VITE_MIDTRANS_CLIENT_KEY%"
    ></script>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
